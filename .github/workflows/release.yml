name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ScreenPut
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Build
        run: |
          xcodebuild -project ScreenPut.xcodeproj \
            -scheme ScreenPut \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Create app bundle
        run: |
          APP_PATH="build/Build/Products/Release/ScreenPut.app"
          echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV
          ls -la "$APP_PATH"

      - name: Create DMG
        run: |
          # Create a temporary directory for DMG contents
          mkdir -p dmg_contents
          cp -R "$APP_PATH" dmg_contents/
          ln -s /Applications dmg_contents/Applications

          # Create DMG
          hdiutil create -volname "ScreenPut" \
            -srcfolder dmg_contents \
            -ov -format UDZO \
            ScreenPut.dmg

          echo "DMG_PATH=ScreenPut.dmg" >> $GITHUB_ENV

      - name: Create ZIP
        run: |
          cd build/Build/Products/Release
          zip -r -y ../../../../ScreenPut.zip ScreenPut.app
          cd ../../../../
          echo "ZIP_PATH=ScreenPut.zip" >> $GITHUB_ENV

      - name: Get version from tag
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ScreenPut ${{ env.VERSION }}
          body: |
            ## ScreenPut ${{ env.VERSION }}

            ### Installation
            1. Download `ScreenPut.dmg`
            2. Open the DMG and drag **ScreenPut** to **Applications**
            3. Launch ScreenPut from Applications
            4. If you see a Gatekeeper warning, right-click the app → **Open** → **Open**

            ### Requirements
            - macOS 14.0 (Sonoma) or later
          files: |
            ScreenPut.dmg
            ScreenPut.zip
          draft: false
          prerelease: false
